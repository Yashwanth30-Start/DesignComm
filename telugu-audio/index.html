<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Raaga Live — Telugu → English Song Translator</title>
<meta name="description" content="Play a Telugu song near your phone. Raaga Live listens, transcribes the lyrics and translates them to English in real time — with a live audio-reactive visualizer." />
<meta name="theme-color" content="#04060b" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Raaga Live" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='0'%3E%3Cstop offset='0' stop-color='%234aa8ff'/%3E%3Cstop offset='1' stop-color='%23ff4d8d'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='14' fill='%23070a12'/%3E%3Cpath d='M6 36 Q12 22 18 34 T30 30 Q34 14 38 32 T50 34 Q54 26 58 33' fill='none' stroke='url(%23g)' stroke-width='3.5' stroke-linecap='round'/%3E%3C/svg%3E" />
<!-- Telugu webfont: enhances online use; falls back to system Telugu fonts (Nirmala UI / Noto) offline -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+Telugu:wght@400;500;700&display=swap" rel="stylesheet" />

<style>
  :root {
    --bg: #04060b;
    --ink: #edf2f3;
    --ink-dim: #8e9a9d;
    --line: rgba(255, 255, 255, 0.09);
    --blue: #4aa8ff;
    --pink: #ff4d8d;
    --violet: #7a5cff;
    --card: rgba(10, 14, 24, 0.62);
    --sans: "Inter", system-ui, -apple-system, "Segoe UI", sans-serif;
    --mono: "JetBrains Mono", ui-monospace, Consolas, monospace;
    --telugu: "Noto Sans Telugu", "Nirmala UI", "Gautami", var(--sans);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    background: radial-gradient(120% 60% at 50% -10%, #0a1020 0%, #04060b 55%, #030408 100%) fixed;
    color: var(--ink);
    font-family: var(--sans);
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }
  #app {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    max-width: 760px; margin: 0 auto;
    padding-top: env(safe-area-inset-top);
  }

  /* corner HUD */
  .hud { position: absolute; top: calc(8px + env(safe-area-inset-top)); font-family: var(--mono); font-size: 9px; letter-spacing: 0.3em; text-transform: uppercase; color: rgba(142,154,157,0.6); pointer-events: none; z-index: 2; }
  .hud.l { left: 18px; } .hud.r { right: 18px; }

  header { display: flex; align-items: center; justify-content: space-between; padding: 34px 20px 4px; }
  h1 { font-size: 19px; font-weight: 600; letter-spacing: 0.02em; }
  h1 span {
    background: linear-gradient(90deg, #5ac8ff, #a58bff, #ff4d8d);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .tag { font-size: 11px; color: var(--ink-dim); margin-top: 2px; }

  .chip {
    display: flex; align-items: center; gap: 7px;
    border: 1px solid var(--line); border-radius: 999px;
    padding: 6px 12px;
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--ink-dim); background: rgba(255,255,255,0.045);
    transition: all 0.3s;
  }
  .chip .dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(142,154,157,0.5); }
  .chip.live { border-color: rgba(255,77,141,0.4); background: rgba(255,77,141,0.1); color: #ff8ab0; }
  .chip.live .dot { background: var(--pink); animation: pulse 1.1s ease-in-out infinite; }
  @keyframes pulse { 50% { opacity: 0.25; } }

  /* visualizer */
  #vizwrap { position: relative; height: 28vh; min-height: 150px; flex-shrink: 0; }
  #viz { width: 100%; height: 100%; display: block; }
  #micwrap { position: absolute; left: 0; right: 0; bottom: -30px; display: flex; justify-content: center; z-index: 3; }
  #mic {
    position: relative; width: 60px; height: 60px; border-radius: 50%;
    border: none; cursor: pointer;
    background: linear-gradient(135deg, #3fa9ff, #7a5cff);
    box-shadow: 0 0 30px rgba(80,150,255,0.5);
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.15s, box-shadow 0.4s, background 0.4s;
  }
  #mic:active { transform: scale(0.93); }
  #mic.live { background: linear-gradient(135deg, #ff4d8d, #b23cff); box-shadow: 0 0 40px rgba(255,77,141,0.6); }
  #mic svg { width: 24px; height: 24px; fill: #fff; position: relative; z-index: 1; }
  #mic .ring { position: absolute; inset: 0; border-radius: 50%; }
  #mic.live .ring { animation: ring 1.6s ease-out infinite; border: 2px solid rgba(255,77,141,0.55); }
  @keyframes ring { from { transform: scale(1); opacity: 1; } to { transform: scale(2.1); opacity: 0; } }

  .hint { margin: 40px 20px 0; text-align: center; font-size: 12.5px; color: var(--ink-dim); line-height: 1.6; min-height: 20px; }
  .hint.warn { color: #ffb86b; } .hint.err { color: #ef6a6a; }

  /* feed */
  #feed { flex: 1; overflow-y: auto; padding: 10px 16px 150px; scroll-behavior: smooth; }
  #feed::-webkit-scrollbar { width: 8px; }
  #feed::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.14); border-radius: 99px; }

  .card {
    background: var(--card);
    border: 1px solid var(--line); border-radius: 16px;
    padding: 13px 16px; margin-bottom: 12px;
    box-shadow: inset 0 1px 1px rgba(255,255,255,0.07), 0 12px 32px rgba(0,0,0,0.35);
    animation: rise 0.45s cubic-bezier(0.16,1,0.3,1);
  }
  @keyframes rise { from { opacity: 0; transform: translateY(14px); } }
  .card .top { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; }
  .card .te { font-family: var(--telugu); font-size: 15.5px; line-height: 1.7; }
  .card .meta { flex-shrink: 0; display: flex; align-items: center; gap: 8px; }
  .card .time { font-family: var(--mono); font-size: 9px; color: rgba(142,154,157,0.6); }
  .card .copy {
    border: none; background: none; cursor: pointer; padding: 2px;
    color: rgba(142,154,157,0.55); transition: color 0.2s;
  }
  .card .copy:hover { color: var(--ink); }
  .card .copy svg { width: 13px; height: 13px; fill: currentColor; }
  .card .roman { font-size: 11px; font-style: italic; letter-spacing: 0.03em; color: var(--ink-dim); margin-top: 2px; }
  .card .en { margin-top: 7px; padding-left: 11px; border-left: 2px solid rgba(255,77,141,0.55); font-size: 13.5px; line-height: 1.6; color: #ffd4e3; }
  .card .pending { margin-top: 7px; font-size: 13px; color: rgba(127,184,255,0.7); animation: pulse 1.2s infinite; }
  .card .retry { margin-top: 7px; font-size: 12px; color: #ffb86b; background: none; border: none; cursor: pointer; text-decoration: underline; text-underline-offset: 3px; }

  .card.interim { border-color: rgba(90,200,255,0.3); background: rgba(90,200,255,0.06); }
  .card.interim .te { color: #bfe4ff; }
  .card.interim .caret { display: inline-block; width: 2px; height: 16px; background: #5ac8ff; vertical-align: middle; margin-left: 3px; animation: pulse 0.9s infinite; }
  .card.interim .en-live { margin-top: 7px; font-size: 13px; font-style: italic; color: rgba(143,208,255,0.85); line-height: 1.6; }

  #empty { text-align: center; padding-top: 46px; opacity: 0.55; }
  #empty .big { font-family: var(--telugu); font-size: 21px; color: var(--ink-dim); }
  #empty .small { font-size: 12px; color: var(--ink-dim); margin-top: 4px; }

  /* footer */
  footer {
    position: absolute; left: 0; right: 0; bottom: 0; z-index: 5;
    padding: 14px 16px calc(16px + env(safe-area-inset-bottom));
    background: linear-gradient(0deg, rgba(3,4,8,0.97) 60%, rgba(3,4,8,0));
    max-width: 760px; margin: 0 auto;
  }
  #pastebox { display: none; margin-bottom: 10px; gap: 8px; align-items: flex-end;
    background: rgba(10,14,24,0.75); border: 1px solid var(--line); border-radius: 14px; padding: 8px;
    backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
  }
  #pastebox.open { display: flex; }
  #pastebox textarea {
    flex: 1; min-height: 48px; max-height: 120px; resize: none;
    background: none; border: none; outline: none;
    color: var(--ink); font-family: var(--telugu); font-size: 14px; line-height: 1.6;
    padding: 6px 8px;
  }
  #pastebox textarea::placeholder { color: rgba(142,154,157,0.5); }
  #pastebox button {
    border: none; border-radius: 10px; cursor: pointer;
    background: linear-gradient(135deg, #3fa9ff, #7a5cff);
    color: #fff; font-family: var(--sans); font-size: 12px; font-weight: 600;
    padding: 10px 16px; box-shadow: 0 0 22px rgba(80,150,255,0.35);
  }
  .bar { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .bar .btn {
    border: 1px solid var(--line); border-radius: 999px; background: rgba(255,255,255,0.03);
    color: rgba(142,154,157,0.9); cursor: pointer;
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
    padding: 8px 13px; transition: color 0.2s, border-color 0.2s;
  }
  .bar .btn:hover { color: var(--ink); border-color: rgba(255,255,255,0.2); }
  .bar .btn:disabled { opacity: 0.35; cursor: default; }
  .bar .count { font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(142,154,157,0.7); }

  #toast {
    position: fixed; left: 50%; bottom: 110px; transform: translateX(-50%) translateY(20px);
    background: rgba(20,26,40,0.95); border: 1px solid var(--line); border-radius: 10px;
    color: var(--ink); font-size: 12px; padding: 9px 16px;
    opacity: 0; pointer-events: none; transition: all 0.3s; z-index: 20;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div id="app">
  <div class="hud l">te-in · asr.live</div>
  <div class="hud r">v1.0 · te → en</div>

  <header>
    <div>
      <h1><span>Raaga Live</span></h1>
      <div class="tag">Telugu songs → English, as you listen</div>
    </div>
    <div class="chip" id="chip"><span class="dot"></span><span id="chiptext">paused</span></div>
  </header>

  <div id="vizwrap">
    <canvas id="viz"></canvas>
    <div id="micwrap">
      <button id="mic" aria-label="Start listening">
        <span class="ring"></span>
        <svg id="ic-mic" viewBox="0 0 24 24"><path d="M12 14a3 3 0 0 0 3-3V6a3 3 0 1 0-6 0v5a3 3 0 0 0 3 3z"/><path d="M18 11a6 6 0 0 1-12 0H4a8 8 0 0 0 7 7.94V21h2v-2.06A8 8 0 0 0 20 11h-2z"/></svg>
        <svg id="ic-stop" viewBox="0 0 24 24" style="display:none"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
      </button>
    </div>
  </div>

  <div class="hint" id="hint">Play a Telugu song near your phone, then tap the mic. Lyrics appear below with live English translation.</div>

  <div id="feed">
    <div id="empty">
      <div class="big">పాట వినిపించండి…</div>
      <div class="small">play a song for me…</div>
    </div>
  </div>

  <footer>
    <div id="pastebox">
      <textarea id="pastetext" rows="2" placeholder="పాట సాహిత్యం పేస్ట్ చేయండి… (paste Telugu lyrics)"></textarea>
      <button id="pastego">Translate</button>
    </div>
    <div class="bar">
      <button class="btn" id="togglepaste">paste lyrics</button>
      <span class="count" id="count">0 lines</span>
      <button class="btn" id="exportbtn" disabled>export</button>
      <button class="btn" id="clearbtn" disabled>clear</button>
    </div>
  </footer>
</div>
<div id="toast"></div>

<script>
"use strict";

/* ------------------------------ state ------------------------------ */
const HISTORY_KEY = "raaga-live-history-v1";
let lines = [];            // {id, te, roman, en, ts, pending, failed}
let interimText = "";
let interimEn = "";
let listening = false;     // user intent
let recognition = null;
let audioCtx = null, micStream = null, wakeLock = null;
const bands = new Float32Array(5);
const cache = new Map();

const $ = (id) => document.getElementById(id);
const feed = $("feed"), chip = $("chip"), chiptext = $("chiptext"), hint = $("hint");
const micBtn = $("mic");
const uid = () => Math.random().toString(36).slice(2, 10);

/* --------------------------- translation --------------------------- */
async function translateTelugu(text, signal) {
  const key = text.trim();
  if (cache.has(key)) return cache.get(key);

  // Primary: Google's public gtx endpoint (no key, CORS-enabled).
  try {
    const url = "https://translate.googleapis.com/translate_a/single?client=gtx&sl=te&tl=en&dt=t&dt=rm&dj=1&q=" + encodeURIComponent(key);
    const res = await fetch(url, { signal });
    if (res.ok) {
      const data = await res.json();
      const sentences = (data && data.sentences) || [];
      const en = sentences.map(s => s.trans || "").join("").trim();
      const roman = sentences.map(s => s.src_translit || "").join(" ").trim();
      if (en) { const out = { en, roman }; cache.set(key, out); return out; }
    }
  } catch (e) { if (e.name === "AbortError") throw e; }

  // Fallback: MyMemory (free, rate-limited).
  const res = await fetch("https://api.mymemory.translated.net/get?langpair=te%7Cen&q=" + encodeURIComponent(key), { signal });
  if (!res.ok) throw new Error("translation failed");
  const data = await res.json();
  const en = ((data.responseData || {}).translatedText || "").trim();
  if (!en) throw new Error("translation empty");
  const out = { en, roman: "" };
  cache.set(key, out);
  return out;
}

/* ----------------------------- history ----------------------------- */
function loadHistory() {
  try {
    const raw = localStorage.getItem(HISTORY_KEY);
    if (raw) { const p = JSON.parse(raw); if (Array.isArray(p)) lines = p.slice(-200); }
  } catch (e) {}
}
function saveHistory() {
  try { localStorage.setItem(HISTORY_KEY, JSON.stringify(lines.slice(-200))); } catch (e) {}
}

/* ------------------------------ render ----------------------------- */
const ICON_COPY = '<svg viewBox="0 0 24 24"><path d="M16 1H4a2 2 0 0 0-2 2v14h2V3h12V1zm3 4H8a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h11a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2zm0 16H8V7h11v14z"/></svg>';
const timeLabel = (ts) => new Date(ts).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
const esc = (s) => s.replace(/[&<>"']/g, c => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[c]));

function render() {
  let html = "";
  if (!lines.length && !interimText) {
    html = '<div id="empty"><div class="big">పాట వినిపించండి…</div><div class="small">play a song for me…</div></div>';
  }
  for (const l of lines) {
    html += '<div class="card"><div class="top"><div class="te">' + esc(l.te) + '</div>' +
      '<div class="meta"><span class="time">' + timeLabel(l.ts) + '</span>' +
      '<button class="copy" data-copy="' + l.id + '" title="Copy">' + ICON_COPY + '</button></div></div>';
    if (l.roman) html += '<div class="roman">' + esc(l.roman) + '</div>';
    if (l.pending) html += '<div class="pending">translating…</div>';
    else if (l.failed) html += '<button class="retry" data-retry="' + l.id + '">translation failed — tap to retry</button>';
    else if (l.en) html += '<div class="en">' + esc(l.en) + '</div>';
    html += '</div>';
  }
  if (interimText) {
    html += '<div class="card interim"><div class="te">' + esc(interimText) + '<span class="caret"></span></div>' +
      (interimEn ? '<div class="en-live">' + esc(interimEn) + '</div>' : '') + '</div>';
  }
  feed.innerHTML = html;
  feed.scrollTop = feed.scrollHeight;

  $("count").textContent = lines.length + (lines.length === 1 ? " line" : " lines");
  $("clearbtn").disabled = !lines.length;
  $("exportbtn").disabled = !lines.length;
}

feed.addEventListener("click", (e) => {
  const copyBtn = e.target.closest("[data-copy]");
  if (copyBtn) {
    const l = lines.find(x => x.id === copyBtn.dataset.copy);
    if (l) {
      const txt = l.te + (l.roman ? "\n" + l.roman : "") + (l.en ? "\n" + l.en : "");
      (navigator.clipboard ? navigator.clipboard.writeText(txt) : Promise.reject())
        .then(() => toast("Copied"))
        .catch(() => toast("Copy not available"));
    }
    return;
  }
  const retryBtn = e.target.closest("[data-retry]");
  if (retryBtn) {
    const l = lines.find(x => x.id === retryBtn.dataset.retry);
    if (l) { l.pending = true; l.failed = false; render(); translateLine(l); }
  }
});

let toastTimer;
function toast(msg) {
  const t = $("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 1600);
}

/* --------------------------- line pipeline -------------------------- */
function translateLine(l) {
  translateTelugu(l.te)
    .then(({ en, roman }) => { l.en = en; if (roman) l.roman = roman; l.pending = false; })
    .catch(() => { l.pending = false; l.failed = true; })
    .then(() => { saveHistory(); render(); });
}
function pushLine(te) {
  const text = te.trim();
  if (!text) return;
  const l = { id: uid(), te: text, roman: "", en: "", ts: Date.now(), pending: true, failed: false };
  lines.push(l);
  saveHistory(); render();
  translateLine(l);
}

/* ------------------- interim (live) translation --------------------- */
let interimTimer = null, interimAbort = null;
function scheduleInterim(text) {
  clearTimeout(interimTimer);
  if (!text.trim()) { interimEn = ""; return; }
  interimTimer = setTimeout(() => {
    if (interimAbort) interimAbort.abort();
    interimAbort = new AbortController();
    const ac = interimAbort;
    translateTelugu(text, ac.signal)
      .then(({ en }) => { if (!ac.signal.aborted && interimText) { interimEn = en; render(); } })
      .catch(() => {});
  }, 500);
}

/* ------------------------- speech recognition ----------------------- */
function setStatus(state, message) {
  chip.classList.toggle("live", state === "listening" || state === "starting");
  chiptext.textContent = state;
  hint.className = "hint" + (state === "mic blocked" ? " err" : state === "no asr" ? " warn" : "");
  hint.textContent = message || "";
  const live = state === "listening" || state === "starting";
  micBtn.classList.toggle("live", live);
  $("ic-mic").style.display = live ? "none" : "";
  $("ic-stop").style.display = live ? "" : "none";
  micBtn.setAttribute("aria-label", live ? "Stop listening" : "Start listening");
}

function spinUp() {
  if (!listening) return;
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  const rec = new SR();
  recognition = rec;
  rec.lang = "te-IN";
  rec.continuous = true;
  rec.interimResults = true;
  rec.maxAlternatives = 1;

  rec.onstart = () => setStatus("listening", "");
  rec.onresult = (event) => {
    let it = "";
    for (let i = event.resultIndex; i < event.results.length; i++) {
      const r = event.results[i];
      const t = (r[0] && r[0].transcript) || "";
      if (r.isFinal) pushLine(t); else it += t;
    }
    interimText = it;
    scheduleInterim(it);
    render();
  };
  rec.onerror = (event) => {
    if (event.error === "not-allowed" || event.error === "service-not-allowed") {
      listening = false;
      setStatus("mic blocked", "Microphone access is blocked — allow the mic for this site in your browser settings, then try again.");
      teardownAudio();
    }
    /* no-speech / aborted / network → onend restarts */
  };
  // Mobile browsers end sessions constantly; keep re-arming while active.
  rec.onend = () => { if (listening) setTimeout(spinUp, 250); };
  try { rec.start(); } catch (e) {}
}

async function attachAnalyser() {
  try {
    micStream = await navigator.mediaDevices.getUserMedia({
      audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: true }
    });
    const AC = window.AudioContext || window.webkitAudioContext;
    audioCtx = new AC();
    const src = audioCtx.createMediaStreamSource(micStream);
    const analyser = audioCtx.createAnalyser();
    analyser.fftSize = 512;
    analyser.smoothingTimeConstant = 0.75;
    src.connect(analyser);
    const data = new Uint8Array(analyser.frequencyBinCount);
    const edges = [2, 8, 20, 44, 90, 180];
    (function tick() {
      if (!audioCtx) return;
      analyser.getByteFrequencyData(data);
      for (let b = 0; b < 5; b++) {
        let sum = 0;
        for (let i = edges[b]; i < edges[b + 1]; i++) sum += data[i];
        bands[b] = Math.min(1, (sum / (edges[b + 1] - edges[b]) / 255) * 1.6);
      }
      requestAnimationFrame(tick);
    })();
  } catch (e) { /* visualizer stays on its idle animation */ }
}

function teardownAudio() {
  if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
  if (audioCtx) { audioCtx.close().catch(() => {}); audioCtx = null; }
  bands.fill(0);
  if (wakeLock) { wakeLock.release().catch(() => {}); wakeLock = null; }
}

async function requestWakeLock() {
  try {
    if ("wakeLock" in navigator) {
      wakeLock = await navigator.wakeLock.request("screen");
      wakeLock.addEventListener("release", () => { wakeLock = null; });
    }
  } catch (e) {}
}
document.addEventListener("visibilitychange", () => {
  if (document.visibilityState === "visible" && listening && !wakeLock) requestWakeLock();
});

function startListening() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    setStatus("no asr", "This browser has no live speech recognition (try Chrome, Edge or Safari 14.5+). You can still paste Telugu lyrics below to translate them.");
    $("pastebox").classList.add("open");
    $("togglepaste").textContent = "hide paste box";
    return;
  }
  listening = true;
  setStatus("starting", "");
  spinUp();
  attachAnalyser();
  requestWakeLock();
}
function stopListening() {
  listening = false;
  if (recognition) { try { recognition.stop(); } catch (e) {} recognition = null; }
  teardownAudio();
  interimText = ""; interimEn = "";
  setStatus("paused", "");
  render();
}
micBtn.addEventListener("click", () => (listening ? stopListening() : startListening()));

/* --------------------------- paste fallback ------------------------- */
$("togglepaste").addEventListener("click", () => {
  const open = $("pastebox").classList.toggle("open");
  $("togglepaste").textContent = open ? "hide paste box" : "paste lyrics";
  if (open) $("pastetext").focus();
});
$("pastego").addEventListener("click", () => {
  const text = $("pastetext").value.trim();
  if (!text) return;
  text.split(/\n+/).map(s => s.trim()).filter(Boolean).forEach(pushLine);
  $("pastetext").value = "";
});

/* ------------------------------ export ------------------------------ */
$("exportbtn").addEventListener("click", () => {
  if (!lines.length) return;
  const stamp = new Date().toISOString().slice(0, 16).replace("T", " ");
  let out = "Raaga Live — Telugu → English session (" + stamp + ")\n" + "=".repeat(52) + "\n\n";
  for (const l of lines) {
    out += l.te + "\n";
    if (l.roman) out += l.roman + "\n";
    out += "→ " + (l.en || "(untranslated)") + "\n\n";
  }
  const blob = new Blob([out], { type: "text/plain;charset=utf-8" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "raaga-session-" + new Date().toISOString().slice(0, 10) + ".txt";
  a.click();
  URL.revokeObjectURL(a.href);
  toast("Session exported");
});

/* ------------------------------- clear ------------------------------ */
$("clearbtn").addEventListener("click", () => {
  lines = [];
  try { localStorage.removeItem(HISTORY_KEY); } catch (e) {}
  render();
  toast("Cleared");
});

/* ---------------------------- visualizer ---------------------------- */
(function startVisualizer() {
  const canvas = $("viz");
  const ctx = canvas.getContext("2d");
  let w = 0, h = 0;

  function resize() {
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    const rect = canvas.getBoundingClientRect();
    w = Math.max(1, rect.width); h = Math.max(1, rect.height);
    canvas.width = w * dpr; canvas.height = h * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  resize();
  window.addEventListener("resize", resize);

  // star-dust particles
  const P = 42, px = [], py = [], pv = [], ps = [];
  for (let i = 0; i < P; i++) { px[i] = Math.random(); py[i] = Math.random(); pv[i] = 0.008 + Math.random() * 0.03; ps[i] = 0.6 + Math.random() * 1.6; }

  const BUMPS = 5;
  const centers = [0.12, 0.32, 0.5, 0.68, 0.88];
  const widths = [0.07, 0.09, 0.08, 0.09, 0.07];
  const smooth = new Float32Array(BUMPS);
  const LINES = 18, STEPS = 90;

  function draw(t) {
    const time = t / 1000;
    for (let b = 0; b < BUMPS; b++) {
      const target = bands[b];
      smooth[b] += (target - smooth[b]) * (target > smooth[b] ? 0.28 : 0.06);
    }
    ctx.clearRect(0, 0, w, h);

    // ambient glows
    let g = ctx.createRadialGradient(w * 0.18, h * 0.5, 0, w * 0.18, h * 0.5, w * 0.45);
    g.addColorStop(0, "rgba(64,160,255,0.045)"); g.addColorStop(1, "rgba(64,160,255,0)");
    ctx.fillStyle = g; ctx.fillRect(0, 0, w, h);
    g = ctx.createRadialGradient(w * 0.84, h * 0.5, 0, w * 0.84, h * 0.5, w * 0.45);
    g.addColorStop(0, "rgba(255,60,120,0.05)"); g.addColorStop(1, "rgba(255,60,120,0)");
    ctx.fillStyle = g; ctx.fillRect(0, 0, w, h);

    // particles
    for (let i = 0; i < P; i++) {
      py[i] -= pv[i] / 100;
      if (py[i] < -0.02) { py[i] = 1.02; px[i] = Math.random(); }
      ctx.fillStyle = px[i] > 0.55 ? "rgba(255,90,140,0.5)" : "rgba(110,190,255,0.5)";
      ctx.beginPath(); ctx.arc(px[i] * w, py[i] * h, ps[i] * 0.7, 0, Math.PI * 2); ctx.fill();
    }

    // harmonic strings
    ctx.globalCompositeOperation = "lighter";
    const mid = h * 0.52;
    const grad = ctx.createLinearGradient(0, 0, w, 0);
    grad.addColorStop(0, "rgba(70,170,255,1)");
    grad.addColorStop(0.45, "rgba(140,160,255,1)");
    grad.addColorStop(0.62, "rgba(240,110,190,1)");
    grad.addColorStop(1, "rgba(255,60,110,1)");

    const idle = 0.11 + 0.05 * Math.sin(time * 1.3) * Math.sin(time * 0.53 + 1.7);
    const amp = h * 0.36;

    function bumpAt(x01) {
      let v = 0;
      for (let b = 0; b < BUMPS; b++) {
        const d = (x01 - centers[b]) / widths[b];
        const wob = 1 + 0.22 * Math.sin(time * (1.1 + b * 0.37) + b * 2.1);
        v += (idle + smooth[b]) * wob * Math.exp(-d * d);
      }
      const edge = Math.min(1, Math.min(x01, 1 - x01) * 14);
      return v * edge;
    }

    for (let li = 0; li < LINES; li++) {
      const k = li / (LINES - 1);
      const spread = (k - 0.5) * 2;
      ctx.strokeStyle = grad;
      ctx.globalAlpha = 0.05 + 0.16 * (1 - Math.abs(spread));
      ctx.lineWidth = Math.abs(spread) < 0.12 ? 1.6 : 1;
      ctx.beginPath();
      for (let s = 0; s <= STEPS; s++) {
        const x01 = s / STEPS;
        const env = bumpAt(x01);
        const y = mid - env * amp * Math.sin(x01 * Math.PI * 6 + time * 2.2) * (0.35 + 0.65 * Math.abs(spread)) - env * amp * 0.12 * spread;
        const x = x01 * w;
        if (s === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.stroke();
    }

    // bright core
    ctx.globalAlpha = 0.9;
    ctx.lineWidth = 1.8;
    ctx.shadowBlur = 12;
    ctx.shadowColor = "rgba(160,140,255,0.8)";
    ctx.strokeStyle = grad;
    ctx.beginPath();
    for (let s = 0; s <= STEPS; s++) {
      const x01 = s / STEPS;
      const env = bumpAt(x01);
      const y = mid - env * amp * Math.sin(x01 * Math.PI * 6 + time * 2.2) * 0.4;
      const x = x01 * w;
      if (s === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
    ctx.globalCompositeOperation = "source-over";

    requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);
})();

/* ------------------------------- boot ------------------------------- */
loadHistory();
render();
</script>
